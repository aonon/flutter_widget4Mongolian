name: mongol
description: Flutter widget package for displaying and editing vertical Mongolian text.
# When updating version, also update CHANGELOG.md and example/lib/main.dart
version: 9.2.1
homepage: https://github.com/suragch/mongol
topics:
  - text

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  characters: ^1.2.1
  # 核心AI能力底座（已支持你的Flutter版本）
  flutter_ai_kit: ^1.0.2  # 最新稳定版，适配Flutter 3.40+
  # 可选：如果需要设计稿转代码（图片识别），补充图片处理依赖
  image_picker: ^1.1.0    # 读取本地设计稿截图
  http: ^1.2.0            # 调用Figma/Google AI API

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  path: any
  fake_async: any
  clock: any
  stack_trace: any
  test_api: any
  meta: any

screenshots:
  - description: "MongolText with styling"
    path: example/supplemental/mongol_rich_text.png
  - description: "MongolText widget"
    path: example/supplemental/mongol_text.gif
